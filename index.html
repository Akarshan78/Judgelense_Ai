
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JudgeLens AI - Predict Your Hackathon Success</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0c0c0f;
      --grid-color: rgba(255, 255, 255, 0.02);
      --accent: #10b981;
      --accent-light: #34d399;
      --accent-dark: #059669;
      --gold: #f59e0b;
      --gold-light: #fbbf24;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      color: #f8fafc;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(20, 20, 25, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 
        0 4px 24px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .glass:hover {
      border-color: rgba(16, 185, 129, 0.15);
      box-shadow: 
        0 4px 24px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(16, 185, 129, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .glass-strong {
      background: rgba(12, 12, 15, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(16, 185, 129, 0.1);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(16, 185, 129, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      animation: glass-breathe 6s ease-in-out infinite;
    }
    
    /* Glass breathing glow */
    @keyframes glass-breathe {
      0%, 100% {
        box-shadow: 
          0 20px 40px rgba(0, 0, 0, 0.5),
          0 0 60px rgba(16, 185, 129, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        border-color: rgba(16, 185, 129, 0.1);
      }
      50% {
        box-shadow: 
          0 20px 40px rgba(0, 0, 0, 0.5),
          0 0 80px rgba(16, 185, 129, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        border-color: rgba(16, 185, 129, 0.2);
      }
    }
    
    /* Glowing card effect */
    .glow-card {
      position: relative;
      overflow: hidden;
    }
    .glow-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg 340deg,
        rgba(16, 185, 129, 0.15) 360deg
      );
      animation: rotate-glow 8s linear infinite;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .glow-card:hover::before {
      opacity: 1;
    }
    .glow-card::after {
      content: '';
      position: absolute;
      inset: 1px;
      background: rgba(12, 12, 15, 0.95);
      border-radius: inherit;
      z-index: 0;
    }
    .glow-card > * {
      position: relative;
      z-index: 1;
    }
    
    @keyframes rotate-glow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .accent-gradient {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
    .text-gradient-bright {
      background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .text-gradient-accent {
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Animated Grid Pattern with breathing */
    .grid-pattern {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 50% at 50% 50%, black, transparent);
      z-index: -10;
      pointer-events: none;
      animation: grid-breathe 12s ease-in-out infinite;
    }
    
    @keyframes grid-breathe {
      0%, 100% { 
        opacity: 0.4;
        background-size: 60px 60px;
      }
      50% { 
        opacity: 0.7;
        background-size: 62px 62px;
      }
    }
    
    /* Ambient light sweep */
    .ambient-light {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -8;
      overflow: hidden;
    }
    .ambient-light::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background: radial-gradient(
        ellipse 40% 30% at 50% 50%,
        rgba(16, 185, 129, 0.03) 0%,
        transparent 60%
      );
      animation: ambient-sweep 15s ease-in-out infinite;
    }
    .ambient-light::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        circle at 80% 20%,
        rgba(16, 185, 129, 0.04) 0%,
        transparent 40%
      );
      animation: ambient-pulse 8s ease-in-out infinite;
    }
    
    @keyframes ambient-sweep {
      0%, 100% {
        transform: translate(0%, 0%) rotate(0deg);
      }
      25% {
        transform: translate(10%, 5%) rotate(5deg);
      }
      50% {
        transform: translate(5%, 10%) rotate(-3deg);
      }
      75% {
        transform: translate(-5%, 5%) rotate(2deg);
      }
    }
    
    @keyframes ambient-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* Animated Gradient Orbs - Breathing Effect */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: -5;
    }
    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.18) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      animation: orb-breathe-1 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.12) 0%, transparent 70%);
      bottom: -150px;
      right: -150px;
      animation: orb-breathe-2 10s ease-in-out infinite;
    }
    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
      top: 50%;
      right: 5%;
      animation: orb-breathe-3 7s ease-in-out infinite;
    }
    
    /* Orb breathing animations */
    @keyframes orb-breathe-1 {
      0%, 100% { 
        transform: scale(1) translate(0, 0); 
        opacity: 0.8;
      }
      50% { 
        transform: scale(1.15) translate(30px, 20px); 
        opacity: 1;
      }
    }
    @keyframes orb-breathe-2 {
      0%, 100% { 
        transform: scale(1) translate(0, 0); 
        opacity: 0.7;
      }
      50% { 
        transform: scale(1.2) translate(-25px, -15px); 
        opacity: 1;
      }
    }
    @keyframes orb-breathe-3 {
      0%, 100% { 
        transform: scale(1) translate(0, 0); 
        opacity: 0.6;
      }
      50% { 
        transform: scale(1.1) translate(-20px, 25px); 
        opacity: 0.9;
      }
    }

    /* Link Underline Animation */
    .nav-link {
      position: relative;
      transition: color 0.2s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      transition: width 0.2s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .nav-link:hover {
      color: var(--accent-light);
    }

    /* Simple Hover Effects */
    .glow-on-hover {
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .glow-on-hover:hover {
      border-color: rgba(16, 185, 129, 0.3);
      transform: translateY(-2px);
    }

    .verdict-ring {
      transition: stroke-dashoffset 1s ease-out;
    }

    /* Gradient Border */
    .gradient-border {
      position: relative;
      background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box,
                  linear-gradient(135deg, var(--accent), var(--gold)) border-box;
      border: 1px solid transparent;
    }

    /* Simple Button Hover */
    .btn-shine {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-shine:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }

    /* Animate In - One time only */
    .animate-in {
      animation: animate-in 0.5s ease-out forwards;
    }
    @keyframes animate-in {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger Children - One time only */
    .stagger-children > * {
      opacity: 0;
      animation: stagger-in 0.4s ease-out forwards;
    }
    .stagger-children > *:nth-child(1) { animation-delay: 0.05s; }
    .stagger-children > *:nth-child(2) { animation-delay: 0.1s; }
    .stagger-children > *:nth-child(3) { animation-delay: 0.15s; }
    .stagger-children > *:nth-child(4) { animation-delay: 0.2s; }
    @keyframes stagger-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading animation */
    @keyframes loading-bar {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Subtle glow pulse - for accents only */
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    .glow-pulse {
      animation: glow-pulse 3s ease-in-out infinite;
    }

    /* Fade in up - one time animation */
    @keyframes fade-in-up {
      from { 
        opacity: 0; 
        transform: translateY(20px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }
    .fade-in-up {
      animation: fade-in-up 0.5s ease-out forwards;
    }

    /* Scale in - for buttons and cards */
    @keyframes scale-in {
      from { 
        opacity: 0; 
        transform: scale(0.95); 
      }
      to { 
        opacity: 1; 
        transform: scale(1); 
      }
    }
    .scale-in {
      animation: scale-in 0.3s ease-out forwards;
    }

    /* Hover lift effect */
    .hover-lift {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.4);
    }

    /* Subtle border glow on hover */
    .hover-glow {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .hover-glow:hover {
      border-color: rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
    }

    /* Processing dots animation */
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }
    .bounce-dot {
      animation: bounce-dot 1s ease-in-out infinite;
    }
    .bounce-dot:nth-child(1) { animation-delay: 0s; }
    .bounce-dot:nth-child(2) { animation-delay: 0.15s; }
    .bounce-dot:nth-child(3) { animation-delay: 0.3s; }

    /* Spin animation for loader */
    @keyframes spin-fast {
      to { transform: rotate(360deg); }
    }
    .spin-fast {
      animation: spin-fast 0.8s linear infinite;
    }

    /* Progress fill animation */
    @keyframes progress-fill {
      from { width: 0%; }
      to { width: 100%; }
    }
    .progress-fill {
      animation: progress-fill 1.5s ease-out forwards;
    }

    /* Pulse ring for loading */
    @keyframes pulse-ring-once {
      0% { transform: scale(0.8); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-ring-anim {
      animation: pulse-ring-once 1s ease-out infinite;
    }

    /* Float up animation for particles */
    @keyframes float-up {
      0%, 100% { 
        transform: translateY(0) scale(1); 
        opacity: 0.6; 
      }
      50% { 
        transform: translateY(-12px) scale(1.2); 
        opacity: 1; 
      }
    }

    /* Fade and slide in animation */
    @keyframes fade-slide-in {
      from { 
        opacity: 0; 
        transform: translateY(10px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    /* Shimmer effect for progress bar */
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Shimmer progress animation */
    @keyframes shimmer-progress {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(0%); }
      100% { transform: translateX(-100%); }
    }

    /* Enhanced bounce animation */
    @keyframes bounce {
      0%, 100% { 
        transform: translateY(0); 
        opacity: 0.5;
      }
      50% { 
        transform: translateY(-4px); 
        opacity: 1;
      }
    }

    /* Glow pulse animation */
    @keyframes glow-breathe {
      0%, 100% { 
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        opacity: 0.8;
      }
      50% { 
        box-shadow: 0 0 40px rgba(16, 185, 129, 0.6);
        opacity: 1;
      }
    }

    /* Orbit animation for decorative elements */
    @keyframes orbit {
      from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
    }

    /* Scale pulse */
    @keyframes scale-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Rotate gradient */
    @keyframes rotate-gradient {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Reduce motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div class="grid-pattern"></div>
  <!-- Ambient Light Sweep -->
  <div class="ambient-light"></div>
  <!-- Animated Gradient Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <!-- Additional glow spots -->
  <div class="orb" style="width: 300px; height: 300px; background: radial-gradient(circle, rgba(20, 184, 166, 0.08) 0%, transparent 70%); top: 30%; left: 10%; animation: orb-breathe-2 9s ease-in-out infinite;"></div>
  <div class="orb" style="width: 250px; height: 250px; background: radial-gradient(circle, rgba(16, 185, 129, 0.06) 0%, transparent 70%); bottom: 30%; left: 50%; animation: orb-breathe-3 11s ease-in-out infinite;"></div>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
